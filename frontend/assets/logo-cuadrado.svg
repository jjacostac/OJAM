<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Emblema OJAM: montañas con ondas">
  <!-- Reversión del logo: fondo blanco cuadrado, sin aro ni texto;
       montañas hasta el borde inferior y ondas más amplias. -->
  <defs>
    <linearGradient id="ondas" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2E8578"/>
      <stop offset="1" stop-color="#5CA84D"/>
    </linearGradient>
    <linearGradient id="ladera" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2F8F7B"/>
      <stop offset="1" stop-color="#57A24E"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" fill="#FFFFFF"/>
  <g fill="none" stroke="url(#ondas)" stroke-width="3.6" stroke-linecap="round">
    <path d="M20 42 A12 12 0 0 1 44 42"/>
    <path d="M13 42 A19 19 0 0 1 51 42"/>
    <path d="M6 42 A26 26 0 0 1 58 42"/>
    <path d="M-1 42 A33 33 0 0 1 65 42"/>
  </g>
  <path d="M0 64 L14 40 L22 50 L34 26 L52 56 L58 46 L64 56 L64 64 Z"
        fill="url(#ladera)" stroke="#1C5E56" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M34 26 L29.5 34 L32 33 L34.5 35.5 L37 33.5 L38.8 34.5 Z" fill="#F4FBF4"/>
</svg>
